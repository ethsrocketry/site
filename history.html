<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History · E-Town Rocket Bureau</title>
  <link rel="icon" type="image/png" href="etrb-logo.png">
  <link rel="apple-touch-icon" href="etrb-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4f9cf9;
      --accent-dim: rgba(79, 156, 249, 0.18);
      --accent-border: rgba(79, 156, 249, 0.35);
      --bg: #08090f;
      --bg2: #0d0f1a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8ecf8;
      --text-muted: rgba(232,236,248,0.45);
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 58px;
      background: rgba(8,9,15,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-brand { font-size: 14px; font-weight: 600; color: var(--text); }
    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: var(--mono); }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    .nav-links a.join-us-link {
      background: linear-gradient(90deg, #4f9cf9, #3fd6a0, #f6c453, #ff7aa2, #4f9cf9);
      background-size: 280% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: joinUsGradientShift 6s linear infinite;
    }
    @keyframes joinUsGradientShift {
      from { background-position: 0% 50%; }
      to { background-position: 280% 50%; }
    }

    .page-header {
      padding: 50px 40px 24px;
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
    }
    .page-header h1 { font-size: 34px; margin-bottom: 10px; }
    .page-header p { font-family: var(--mono); color: var(--text-muted); font-size: 13px; }

    .history-wrap { padding: 36px 40px 56px; }
    .history-card {
      max-width: 920px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .history-card h1, .history-card h2 { margin-bottom: 10px; }
    .history-card h1 { font-size: 28px; }
    .history-card h2 { font-size: 20px; color: var(--accent); margin-top: 18px; }
    .history-card p, .history-card li {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .history-card ul { padding-left: 20px; margin-bottom: 12px; }
    .history-card hr { border: none; border-top: 0.5px solid var(--border); margin: 18px 0; }

    @media (max-width: 700px) {
      nav { padding: 0 20px; }
      .page-header, .history-wrap { padding-left: 20px; padding-right: 20px; }
      .nav-links { gap: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="home.html">
      <img src="etrb-logo.png" alt="E-Town Rocket Bureau logo" />
      <span class="nav-brand">E-Town Rocket Bureau</span>
    </a>
    <ul class="nav-links">
      <li><a href="home.html">home</a></li>
      <li><a href="arc-2026.html">arc 2026</a></li>
      <li><a href="history.html" class="active">history</a></li>
      <li><a href="join-us.html" class="join-us-link">join us</a></li>
      <li><a href="member-tools.html">member tools</a></li>
    </ul>
  </nav>

  <header class="page-header">
    <h1>History</h1>
    <p>Milestones and program timeline for E-Town Rocket Bureau.</p>
  </header>

  <main class="history-wrap">
    <article class="history-card" id="history-content">Loading history…</article>
  </main>

  <script>
    function renderMarkdown(md) {
      const lines = md.split('\n');
      const out = [];
      let inList = false;

      for (const line of lines) {
        if (line.startsWith('# ')) { if (inList) { out.push('</ul>'); inList = false; } out.push(`<h1>${line.slice(2)}</h1>`); continue; }
        if (line.startsWith('## ')) { if (inList) { out.push('</ul>'); inList = false; } out.push(`<h2>${line.slice(3)}</h2>`); continue; }
        if (line.startsWith('- ')) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push(`<li>${line.slice(2).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</li>`);
          continue;
        }
        if (line.trim() === '---') { if (inList) { out.push('</ul>'); inList = false; } out.push('<hr />'); continue; }
        if (line.trim() === '') { if (inList) { out.push('</ul>'); inList = false; } continue; }
        if (inList) { out.push('</ul>'); inList = false; }
        out.push(`<p>${line.replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`);
      }
      if (inList) out.push('</ul>');
      return out.join('');
    }

    fetch('history_data.md')
      .then((res) => res.text())
      .then((md) => { document.getElementById('history-content').innerHTML = renderMarkdown(md); })
      .catch(() => {
        document.getElementById('history-content').innerHTML = '<p>Could not load history data.</p>';
      });
  </script>
</body>
</html>
