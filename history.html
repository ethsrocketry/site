<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History · ETHS Rocketry</title>
  <link rel="icon" type="image/png" href="etrb-logo.png">
  <link rel="apple-touch-icon" href="etrb-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4f9cf9;
      --accent-dim: rgba(79, 156, 249, 0.18);
      --accent-border: rgba(79, 156, 249, 0.35);
      --bg: #08090f;
      --bg2: #0d0f1a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8ecf8;
      --text-muted: rgba(232,236,248,0.45);
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 58px;
      background: rgba(8,9,15,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-brand { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0.04em; }
    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }

    .member-entry { display: inline-flex; align-items: center; gap: 7px; }
    .lock-icon { width: 13px; height: 13px; display: inline-flex; color: rgba(255,90,90,0.85); transition: color 0.3s; flex-shrink: 0; }
    .lock-icon svg { width: 13px; height: 13px; }
    .lock-icon.unlocked { color: #3fd6a0; }
    .member-pill { display: inline-flex; align-items: center; gap: 10px; border: 0.5px solid var(--accent-border); background: var(--accent-dim); border-radius: 999px; padding: 5px 14px; }
    .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: var(--mono); }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    .nav-links a.join-us-link {
      background: linear-gradient(90deg, #4f9cf9, #3fd6a0, #f6c453, #ff7aa2, #4f9cf9);
      background-size: 280% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: joinUsGradientShift 6s linear infinite;
    }
    @keyframes joinUsGradientShift {
      from { background-position: 0% 50%; }
      to { background-position: 280% 50%; }
    }

    .page-header {
      padding: 50px 40px 24px;
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
    }
    .page-header h1 { font-size: 34px; margin-bottom: 10px; }
    .page-header p { font-family: var(--mono); color: var(--text-muted); font-size: 13px; }

    .history-wrap { padding: 36px 40px 56px; }
    .history-card {
      max-width: 920px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }
    .history-card h1, .history-card h2 { margin-bottom: 10px; }
    .history-card h1 { font-size: 28px; }
    .history-card h2 { font-size: 20px; color: var(--accent); margin-top: 18px; }
    .history-card p, .history-card li {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .history-card ul { padding-left: 20px; margin-bottom: 12px; }
    .history-card hr { border: none; border-top: 0.5px solid var(--border); margin: 18px 0; }

    @media (max-width: 700px) {
      nav { padding: 0 20px; }
      .page-header, .history-wrap { padding-left: 20px; padding-right: 20px; }
      .nav-links { gap: 16px; }
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-radius: 6px;
      border: 0.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--mono); font-size: 12px;
      color: var(--text-muted);
    }
    .theme-toggle:hover {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
    }
    .theme-toggle svg { width: 16px; height: 16px; }

    /* LIGHT MODE - Main overrides */
    html.light-mode {
      --bg: #f5f7fa;
      --bg2: #fff;
      --bg3: #f8fafc;
      --surface: #f8fafc;
      --surface-hover: #f0f4f9;
      --border: #d4dce8;
      --border-accent: #b8d4f1;
      --text: #1a2332;
      --text-muted: #5a6c7d;
      --text-faint: #7a8a99;
      --accent: #2980b9;
      --accent-dim: #e8f4fd;
    }

    html.light-mode .theme-toggle {
      border-color: #d4dce8;
      color: #5a6c7d;
    }
    html.light-mode .theme-toggle:hover {
      background: #f0f4f9;
      border-color: #2980b9;
      color: #2980b9;
    }

    /* Page-specific light mode overrides */
    html.light-mode .page-header {
      background: #fff;
      border-bottom-color: #d4dce8;
    }
    html.light-mode .page-header h1 {
      color: #1a2332;
    }
    html.light-mode .page-header p {
      color: #5a6c7d;
    }
    html.light-mode .history-card {
      background: #fff;
      border-color: #d4dce8;
    }
    html.light-mode .history-card h1,
    html.light-mode .history-card h2 {
      color: #1a2332;
    }
    html.light-mode .history-card p,
    html.light-mode .history-card li {
      color: #5a6c7d;
    }
    html.light-mode .history-card hr {
      border-top-color: #d4dce8;
    }
    html.light-mode .skill-card {
      background: #f8fafc;
      border-color: #d4dce8;
    }
    html.light-mode .skill-card:hover {
      background: #f0f4f9;
      border-color: #b8d4f1;
    }
    html.light-mode .skill-card h3 {
      color: #1a2332;
    }
    html.light-mode .skill-card p {
      color: #5a6c7d;
    }
    html.light-mode .discord-cta {
      color: #2980b9;
      border-color: #b8d4f1;
      background: #e8f4fd;
    }
    html.light-mode .discord-cta:hover {
      background: #d4e8fb;
      border-color: #2980b9;
    }
    html.light-mode .page-eyebrow {
      color: #2980b9;
    }
    html.light-mode .hero-inner {
      background: rgba(255, 255, 255, 0.95);
      border-color: #d4dce8;
    }
    html.light-mode .wip-note {
      color: #5a6c7d;
    }
    html.light-mode .status-list {
      color: #5a6c7d;
    }
    html.light-mode .result-highlight {
      border-color: #f6c453;
      background: #fff9e6;
      color: #c99a00;
    }
    html.light-mode nav {
      background: rgba(245, 247, 250, 0.88);
      border-bottom-color: #d4dce8;
    }
    html.light-mode .nav-brand {
      color: #1a2332;
    }
    html.light-mode .nav-links a {
      color: #5a6c7d;
    }
    html.light-mode .nav-links a:hover,
    html.light-mode .nav-links a.active {
      color: #2980b9;
    }
    html.light-mode .member-pill {
      border-color: #b8d4f1;
      background: #e8f4fd;
    }
    html.light-mode .member-pill a {
      color: #2980b9;
    }
    html.light-mode .member-pill-sep {
      background: #d4dce8;
    }
    html.light-mode footer {
      border-top-color: #d4dce8;
      background: #f5f7fa;
    }
    html.light-mode .footer-left,
    html.light-mode .footer-right {
      color: #7a8a99;
    }

  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="home.html">

      <span class="nav-brand">ETHS Rocketry</span>
    </a>
    <ul class="nav-links">

          <span>member tools</span>
          <span class="lock-icon" id="member-lock-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 9V6.8a3 3 0 1 1 6 0V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
        </a>
      </li>
    </ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
  </nav>

  <header class="page-header">
    <h1>History</h1>
    <p>Milestones and program timeline for ETHS Rocketry.</p>
  </header>

  <main class="history-wrap">
    <article class="history-card" id="history-content">Loading history…</article>
  </main>

  <script>
    function renderMarkdown(md) {
      const lines = md.split('\n');
      const out = [];
      let inList = false;

      for (const line of lines) {
        if (line.startsWith('# ')) { if (inList) { out.push('</ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>'); inList = false; } out.push(`<h1>${line.slice(2)}</h1>`); continue; }
        if (line.startsWith('## ')) { if (inList) { out.push('</ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>'); inList = false; } out.push(`<h2>${line.slice(3)}</h2>`); continue; }
        if (line.startsWith('- ')) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push(`<li>${line.slice(2).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</li>`);
          continue;
        }
        if (line.trim() === '---') { if (inList) { out.push('</ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>'); inList = false; } out.push('<hr />'); continue; }
        if (line.trim() === '') { if (inList) { out.push('</ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>'); inList = false; } continue; }
        if (inList) { out.push('</ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>'); inList = false; }
        out.push(`<p>${line.replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`);
      }
      if (inList) out.push('</ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
        <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>');
      return out.join('');
    }

    fetch('history_data.md')
      .then((res) => res.text())
      .then((md) => { document.getElementById('history-content').innerHTML = renderMarkdown(md); })
      .catch(() => {
        document.getElementById('history-content').innerHTML = '<p>Could not load history data.</p>';
      });
  </script>

  <script>
    const SESSION_KEY = 'etrb_auth';
    (function setMemberNavState() {
      const isLoggedIn = localStorage.getItem(SESSION_KEY) === 'true';
      const icon = document.getElementById('member-lock-icon');
      if (icon) icon.classList.toggle('unlocked', isLoggedIn);
    })();
  </script>

  <script>
    const THEME_KEY = 'etrb-theme';
    const htmlEl = document.documentElement;
    const toggleBtn = document.getElementById('theme-toggle');
    
    // Initialize theme from localStorage
    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      const isDark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
      
      if (!isDark) {
        htmlEl.classList.add('light-mode');
      }
    }
    
    // Toggle theme
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        htmlEl.classList.toggle('light-mode');
        const isLight = htmlEl.classList.contains('light-mode');
        localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
      });
    }
    
    // Initialize on load
    initTheme();
  </script>

</body>
