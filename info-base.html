<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info Base · ETHS Rocketry</title>
  
  <link rel="icon" type="image/png" href="etrb-logo.png">
  <link rel="apple-touch-icon" href="etrb-logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --accent: #4f9cf9; 
      --accent-dim: rgba(79, 156, 249, 0.18); 
      --accent-border: rgba(79, 156, 249, 0.35);
      --bg: #08090f; 
      --bg2: #0d0f1a; 
      --surface: rgba(255,255,255,0.04); 
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08); 
      --text: #e8ecf8; 
      --text-muted: rgba(232,236,248,0.45); 
      --text-faint: rgba(232,236,248,0.22);
      --red: rgba(255, 90, 90, 0.85); 
      --mono: 'Space Mono', monospace; 
      --sans: 'Syne', sans-serif;
    }

    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--sans); 
      line-height: 1.6; 
      min-height: 100vh; 
    }

    /* ── NAVIGATION ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 58px;
      background: rgba(8,9,15,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; flex-shrink: 0; object-fit: contain; }
    .nav-brand { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); }
    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: var(--mono); transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    .nav-links a.join-us-link {
      background: linear-gradient(90deg, #4f9cf9, #3fd6a0, #f6c453, #ff7aa2, #4f9cf9);
      background-size: 280% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: joinUsGradientShift 6s linear infinite;
    }
    @keyframes joinUsGradientShift {
      from { background-position: 0% 50%; }
      to { background-position: 280% 50%; }
    }

    .member-entry { display: inline-flex; align-items: center; gap: 7px; }
    .lock-icon { width: 13px; height: 13px; display: inline-flex; color: var(--red); transition: color 0.3s; flex-shrink: 0; }
    .lock-icon svg { width: 13px; height: 13px; }
    .lock-icon.unlocked { color: #3fd6a0; }
    
    .member-pill { display: inline-flex; align-items: center; gap: 10px; border: 0.5px solid var(--accent-border); background: var(--accent-dim); border-radius: 999px; padding: 5px 14px; }
    .member-pill a { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .member-pill a:hover, .member-pill a.active { color: var(--accent); }
    .member-pill-sep { width: 0.5px; height: 12px; background: rgba(255,255,255,0.12); display: inline-block; }
    .member-only { display: none; }

    /* ── LOGIN GATE ── */
    #login-gate { 
      position: relative;
      min-height: calc(100vh - 58px); 
      display: flex; align-items: center; justify-content: center; 
      padding: 40px 20px; background: var(--bg2); 
      overflow: hidden;
    }

    #login-gate::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 8%  15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.2px 1.2px at 22% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 38% 10%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.2px 1.2px at 92% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 40%, rgba(255,255,255,0.75) 0%, transparent 100%),
        radial-gradient(1.2px 1.2px at 95% 80%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 20% 5%, rgba(255,255,255,0.8) 0%, transparent 100%);
      pointer-events: none;
    }

    .login-card { position: relative; z-index: 1; background: var(--bg); border: 0.5px solid var(--border); border-radius: 14px; padding: 40px; width: 100%; max-width: 380px; }
    .login-card h1 { font-size: 20px; margin-bottom: 6px; color: #f0f4ff; }
    .login-card p { font-family: var(--mono); font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }
    
    .field { margin-bottom: 16px; }
    .field label { display: block; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 7px; }
    .field input { width: 100%; padding: 10px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--accent-border); }
    .field input::placeholder { color: var(--text-faint); }

    .error-msg { font-family: var(--mono); font-size: 12px; color: var(--red); margin-bottom: 14px; display: none; padding: 8px 12px; background: rgba(255,90,90,0.08); border: 0.5px solid rgba(255,90,90,0.25); border-radius: 6px; }
    .error-msg.visible { display: block; }
    .login-btn { width: 100%; padding: 11px; background: var(--accent-dim); border: 0.5px solid var(--accent-border); border-radius: 6px; color: var(--accent); font-family: var(--mono); font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .login-btn:hover { background: rgba(79, 156, 249, 0.25); }

    /* ── MEMBER CONTENT ── */
    #member-content { display: none; }
    .page-header { padding: 52px 40px 32px; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; }
    .page-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .page-eyebrow::before { content: '> '; opacity: 0.5; }
    .page-header h1 { font-size: 32px; font-weight: 700; color: #f0f4ff; }
    .logout-btn { font-family: var(--mono); font-size: 12px; color: var(--text-faint); background: none; border: 0.5px solid var(--border); border-radius: 6px; padding: 8px 16px; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .section { padding: 40px; }
    .section h2 { font-size: 22px; margin-bottom: 24px; text-transform: lowercase; color: var(--text); }
    .doc-list { list-style: none; display: flex; flex-direction: column; gap: 12px; max-width: 760px; }
    .doc-link { 
      display: flex; justify-content: space-between; align-items: center; 
      background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; 
      padding: 18px 20px; color: var(--text); text-decoration: none; 
      transition: background 0.2s, border-color 0.2s; 
    }
    .doc-link:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.14); }
    .doc-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .doc-desc { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
    .doc-icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--accent); }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 12px; border-radius: 6px;
      border: 0.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--mono); font-size: 12px;
      color: var(--text-muted);
    }
    .theme-toggle:hover {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent);
    }
    .theme-toggle svg { width: 16px; height: 16px; }

    /* LIGHT MODE */
    html.light-mode {
      --bg: #f5f7fa;
      --bg2: #fff;
      --surface: #f8fafc;
      --surface-hover: #f0f4f9;
      --border: #d4dce8;
      --text: #1a2332;
      --text-muted: #5a6c7d;
      --text-faint: #7a8a99;
      --accent: #2980b9;
      --accent-dim: #e8f4fd;
      --accent-border: rgba(41, 128, 185, 0.35);
    }

    html.light-mode .theme-toggle {
      border-color: #d4dce8;
      color: #5a6c7d;
    }
    html.light-mode .theme-toggle:hover {
      background: #f0f4f9;
      border-color: #2980b9;
      color: #2980b9;
    }

    html.light-mode .page-header {
      background: #fff;
      border-bottom-color: #d4dce8;
    }
    html.light-mode .page-header h1 {
      color: #1a2332;
    }
    html.light-mode .page-eyebrow {
      color: #2980b9;
    }
    html.light-mode .logout-btn {
      color: #7a8a99;
      border-color: #d4dce8;
    }
    html.light-mode .logout-btn:hover {
      color: #1a2332;
      border-color: #5a6c7d;
    }

    html.light-mode .section {
      background: transparent;
    }
    html.light-mode .section h2 {
      color: #1a2332;
    }

    html.light-mode .doc-link {
      background: #f8fafc;
      border-color: #d4dce8;
      color: #1a2332;
    }
    html.light-mode .doc-link:hover {
      background: #f0f4f9;
      border-color: #b8d4f1;
    }
    html.light-mode .doc-title {
      color: #1a2332;
    }
    html.light-mode .doc-desc {
      color: #5a6c7d;
    }

    html.light-mode .login-card {
      background: #fff;
      border-color: #d4dce8;
    }
    html.light-mode .login-card h1 {
      color: #1a2332;
    }
    html.light-mode .login-card p {
      color: #5a6c7d;
    }
    html.light-mode .field input {
      background: #f8fafc;
      border-color: #d4dce8;
      color: #1a2332;
    }
    html.light-mode .field input:focus {
      border-color: #2980b9;
    }
    html.light-mode .field label {
      color: #7a8a99;
    }
    html.light-mode .login-btn {
      background: #e8f4fd;
      border-color: #b8d4f1;
      color: #2980b9;
    }
    html.light-mode .login-btn:hover {
      background: #d4e8fb;
    }

    html.light-mode nav {
      background: rgba(245, 247, 250, 0.88);
      border-bottom-color: #d4dce8;
    }
    html.light-mode .nav-brand {
      color: #1a2332;
    }
    html.light-mode .nav-links a {
      color: #5a6c7d;
    }
    html.light-mode .nav-links a:hover,
    html.light-mode .nav-links a.active {
      color: #2980b9;
    }
    html.light-mode .member-pill {
      border-color: #b8d4f1;
      background: #e8f4fd;
    }
    html.light-mode .member-pill a {
      color: #2980b9;
    }
    html.light-mode .member-pill-sep {
      background: #d4dce8;
    }

    @media (max-width: 700px) {
      nav { padding: 0 20px; }
      .page-header { padding: 36px 20px 28px; flex-direction: column; align-items: flex-start; gap: 16px; }
      .section { padding: 28px 20px 36px; }
      .login-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="home.html">
      <img src="etrb-logo.png" alt="ETHS Rocketry logo" />
      <span class="nav-brand">ETHS Rocketry</span>
    </a>
    <ul class="nav-links">
      <li><a href="home.html">home</a></li>
      <li><a href="arc-2026.html">arc 2026</a></li>
      <li><a href="r4s.html">r4s</a></li>
      <li><a href="history.html">history</a></li>
      <li><a href="join-us.html" class="join-us-link">join us</a></li>
      <li class="member-pill" id="member-pages-pill">
        <a href="member-tools.html" class="member-entry">
          <span>member tools</span>
          <span class="lock-icon" id="member-lock-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 9V6.8a3 3 0 1 1 6 0V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
        </a>
        <span class="member-pill-sep member-only" id="member-pill-sep"></span>
        <a href="info-base.html" class="member-only active" id="member-info-link">info base</a>
      </li>
    </ul>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
      <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </nav>

  <div id="login-gate">
    <div class="login-card">
      <h1>Member access</h1>
      <p>Sign in to access the info base.</p>
      <div class="field"><label>Username</label><input type="text" id="username" placeholder="username" /></div>
      <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" /></div>
      <div class="error-msg" id="error-msg">Incorrect username or password.</div>
      <button class="login-btn" onclick="tryLogin()">Sign in →</button>
    </div>
  </div>

  <div id="member-content">
    <div class="page-header">
      <div>
        <div class="page-eyebrow">Member resources</div>
        <h1>Info Base</h1>
      </div>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>

    <div id="dynamic-content"></div>
  </div>

  <script>
    const SESSION_KEY = 'etrb_auth';
    const CORRECT_USER = 'member';
    const CORRECT_PASS = 'rktpass1';

    // --- NAV STATE ---
    function setMemberNavState(isLoggedIn) {
      const icon = document.getElementById('member-lock-icon');
      const infoLink = document.getElementById('member-info-link');
      const pillSep = document.getElementById('member-pill-sep');
      if (icon) icon.classList.toggle('unlocked', isLoggedIn);
      if (infoLink) infoLink.style.display = isLoggedIn ? 'inline-flex' : 'none';
      if (pillSep) pillSep.style.display = isLoggedIn ? 'inline-block' : 'none';
    }

    // --- PARSER ENGINE ---
    async function loadInfoBase() {
      const container = document.getElementById('dynamic-content');
      try {
        const response = await fetch('info-base_data.txt');
        if (!response.ok) throw new Error('File not found');
        const text = await response.text();
        const lines = text.split('\n');
        
        let html = '';
        let listOpen = false;

        lines.forEach(line => {
          line = line.trim();
          if (!line || line.startsWith('//')) return;

          const headingMatch = line.match(/^heading\((.*)\)$/);
          const linkMatch = line.match(/^link\((.*),\s*(.*),\s*(.*),\s*(.*)\)$/);

          if (headingMatch) {
            if (listOpen) { html += '</ul></section>'; }
            html += `<section class="section"><h2>${headingMatch[1]}</h2><ul class="doc-list">`;
            listOpen = true;
          } 
          else if (linkMatch) {
            const [_, title, desc, type, url] = linkMatch;
            let iconSVG = '';
            
            if (type.trim().toUpperCase() === 'DOC') {
              iconSVG = `<svg class="doc-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="3" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 7H13M7 10H13M7 13H11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`;
            }

            html += `
              <li>
                <a class="doc-link" href="${url.trim()}" target="_blank" rel="noopener noreferrer">
                  <div>
                    <div class="doc-title">${title.trim()}</div>
                    <div class="doc-desc">${desc.trim()}</div>
                  </div>
                  ${iconSVG}
                </a>
              </li>`;
          }
        });

        if (listOpen) html += '</ul></section>';
        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `<div class="section"><p style="color:var(--red); font-family:var(--mono); font-size:13px;">[ERROR] Failed to load info-base_data.txt archive.</p></div>`;
      }
    }

    // --- AUTH LOGIC ---
    function tryLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const err  = document.getElementById('error-msg');
      if (user === CORRECT_USER && pass === CORRECT_PASS) {
        localStorage.setItem(SESSION_KEY, '1');
        err.classList.remove('visible');
        showContent();
      } else {
        err.classList.add('visible');
        document.getElementById('password').value = '';
      }
    }

    function logout() {
      localStorage.removeItem(SESSION_KEY);
      location.reload();
    }

    function showContent() {
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('member-content').style.display = 'block';
      setMemberNavState(true);
      loadInfoBase();
    }

    // Check if already logged in via localStorage
    if (localStorage.getItem(SESSION_KEY) === '1') {
      showContent();
    } else {
      setMemberNavState(false);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('login-gate').style.display !== 'none') tryLogin();
    });
  </script>

  <script>
    const THEME_KEY = 'etrb-theme';
    const htmlEl = document.documentElement;
    const toggleBtn = document.getElementById('theme-toggle');
    
    // Initialize theme from localStorage
    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY);
      const isDark = saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches);
      
      if (!isDark) {
        htmlEl.classList.add('light-mode');
      }
    }
    
    // Toggle theme
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        htmlEl.classList.toggle('light-mode');
        const isLight = htmlEl.classList.contains('light-mode');
        localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
      });
    }
    
    // Initialize on load
    initTheme();
  </script>

</body>
</html>
