<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R4S Org · ETHS Rocketry</title>
  <link rel="icon" type="image/png" href="../site-media/favicon.png">
  <link rel="apple-touch-icon" href="../site-media/logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a; --bg-alt: #1e293b; --nav-bg: #0f172a;
      --surface: rgba(30, 41, 59, 0.4); --surface-hover: rgba(51, 65, 85, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --eths-blue: #3b82f6; --eths-orange: #f97316;
      --text: #f8fafc; --text-muted: #94a3b8;
      --font-display: 'Space Grotesk', sans-serif;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    :root[data-theme="light"] {
      --bg: #f8fafc; --bg-alt: #f1f5f9; --nav-bg: #f8fafc;
      --surface: #ffffff; --surface-hover: #e2e8f0; --border: rgba(15, 23, 42, 0.08);
      --eths-blue: #1d4ed8; --eths-orange: #ea580c;
      --text: #0f172a; --text-muted: #475569;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-sans);
      line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ── NAV DECK ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 72px;
      background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo img { width: 28px; height: 28px; object-fit: contain; }
    .nav-brand { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }

    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .nav-links a.join-us-link {
      color: #fff; font-weight: 700; padding: 8px 18px;
      background: var(--eths-orange); border-radius: 4px;
      transition: transform 0.2s, filter 0.2s;
    }
    .nav-links a.join-us-link:hover { filter: brightness(1.05); transform: translateY(-1px); }

    /* Dropdown Module Engine */
    .dropdown { position: relative; }
    .dropdown-toggle {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--text-muted); cursor: pointer; padding: 20px 0; display: flex; align-items: center; gap: 6px; text-decoration: none;
    }
    .dropdown-toggle:hover, .dropdown.active .dropdown-toggle { color: var(--text); }
    .dropdown-content {
      display: none; position: absolute; top: 100%; left: 0; background: var(--bg-alt);
      border: 1px solid var(--border); border-radius: 6px; min-width: 240px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 8px 0; z-index: 100;
    }
    .dropdown:hover .dropdown-content { display: block; }
    
    .dropdown-item {
      padding: 10px 20px; color: var(--text-muted); text-decoration: none; display: block; font-size: 14px; font-weight: 500; transition: background-color 0.15s, color 0.15s;
    }
    .dropdown-item:hover, .dropdown-item.active { background: var(--surface-hover); color: var(--text); }

    .member-dropdown .dropdown-content { left: auto; right: 0; min-width: 200px; }

    .member-pill { display: inline-flex; align-items: center; gap: 10px; background: rgba(148,163,184,0.05); border: 1px solid var(--border); border-radius: 4px; padding: 6px 14px; cursor: pointer; }
    .member-entry { display: inline-flex; align-items: center; gap: 6px; font-weight: 500; font-size: 13px; color: var(--text); text-decoration: none; }
    .lock-icon { width: 8px; height: 8px; background: var(--eths-orange); border-radius: 50%; }
    .lock-icon.unlocked { background: #10b981; }
    .member-only { display: none; }

    /* ── CONTENT CANVAS ── */
    .program-layout { max-width: 960px; margin: 0 auto; padding: 0 20px; }
    
    #login-gate {
      min-height: calc(100vh - 72px); display: flex; align-items: center; justify-content: center;
    }

    .page-header {
      padding: 60px 0 40px 0; display: flex; justify-content: space-between; align-items: flex-end;
    }
    .page-eyebrow { font-family: var(--font-mono); font-size: 12px; color: var(--eths-orange); text-transform: uppercase; letter-spacing: 0.1em; }
    .page-header h1 { font-family: var(--font-display); font-size: 42px; font-weight: 700; }

    .section { padding: 60px 0; border-top: 1px solid var(--border); }
    .section-tag { font-family: var(--font-mono); font-size: 12px; color: var(--eths-orange); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }
    .section h2 { font-family: var(--font-display); font-size: 28px; font-weight: 700; margin-bottom: 32px; }

    .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .tool-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 28px; text-decoration: none; color: inherit; transition: all 0.2s ease;
      display: flex; gap: 20px;
    }
    .tool-card:hover { border-color: var(--eths-orange); background: var(--surface-hover); transform: translateY(-4px); }
    
    .tool-icon {
      width: 48px; height: 48px; border-radius: 8px; background: rgba(59, 130, 246, 0.1);
      border: 1px solid var(--eths-blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .tool-name { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .tool-desc { color: var(--text-muted); line-height: 1.5; font-size: 15px; }

    /* Drive Embed Module */
    .drive-embed-container {
      width: 100%; height: 600px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); overflow: hidden; margin-top: 20px;
    }
    .drive-embed-container iframe { width: 100%; height: 100%; border: none; }

    .logout-btn {
      font-family: var(--font-mono); font-size: 13px; padding: 8px 16px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 6px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .logout-btn:hover { border-color: var(--eths-orange); color: var(--text); }

    .theme-toggle {
      width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); background: var(--surface); border-radius: 4px;
      color: var(--text-muted); cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--eths-orange); }
    .theme-toggle-icon { width: 16px; height: 16px; display: inline-flex; }
    .theme-toggle-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

    footer { border-top: 1px solid var(--border); padding: 40px 0; margin-top: 80px; display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

    @media (max-width: 900px) {
      nav { padding: 0 20px; }
      .tools-grid { grid-template-columns: 1fr; }
      .drive-embed-container { height: 450px; }
    }
  

  </style>
  <script src="default.js"></script>
</head>
<body>
  <div id="site-nav"></div>

  <main class="program-layout">
    <div id="login-gate">
      <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 48px 40px; max-width: 400px; width: 100%;">
        <h1 style="font-family: var(--font-display); font-size: 28px;">Member Access</h1>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Sign in to access the R4S Org files.</p>
        <div style="margin: 24px 0;">
          <label style="font-family: var(--font-mono); font-size: 12px; display:block; margin-bottom:6px;">Username</label>
          <input type="text" id="username" placeholder="member" style="width:100%; padding:12px 16px; background:var(--bg-alt); border:1px solid var(--border); border-radius:6px; color:var(--text); outline: none;">
        </div>
        <div style="margin-bottom: 24px;">
          <label style="font-family: var(--font-mono); font-size: 12px; display:block; margin-bottom:6px;">Password</label>
          <input type="password" id="password" placeholder="••••••••" style="width:100%; padding:12px 16px; background:var(--bg-alt); border:1px solid var(--border); border-radius:6px; color:var(--text); outline: none;">
        </div>
        <div id="error-msg" style="display:none; color:#f87171; font-family:var(--font-mono); margin-bottom: 16px; font-size:13px;">Incorrect username or password.</div>
        <button onclick="tryLogin()" style="width:100%; padding:14px; background:var(--eths-orange); color:white; border:none; border-radius:6px; font-weight:700; cursor:pointer;">Sign In</button>
      </div>
    </div>

    <div id="member-content" style="display:none;">
      <div class="page-header">
        <div>
          <div class="page-eyebrow">MEMBERS ONLY</div>
          <h1>R4S Organization</h1>
        </div>
      </div>
      
      <div id="dynamic-r4s-root"></div>
    </div>

    <footer>
    <div>ETHS Rocketry</div>
    <div>Evanston Township High School // 2026</div>
  </footer>
  </main>

  <script>
    const SESSION_KEY = 'etrb_auth';
    const CORRECT_USER = 'member';
    const CORRECT_PASS = 'rktpass1';

    const SVG_PRESETS = {
      library: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--eths-blue)" stroke-width="2"><path d="M4 4h5v12H4zM11 4h5v12h-5z"/></svg>`,
      flight: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--eths-blue)" stroke-width="2"><path d="M10 2L10 14M10 2L7 6M10 2L13 6"/><path d="M4 17h12"/></svg>`,
      notes: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--eths-blue)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M7 10h10M7 14h6"/></svg>`,
      schedule: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--eths-blue)" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`,
      infobase: `<svg viewBox="0 0 24 24" fill="none" stroke="var(--eths-blue)" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h10"/></svg>`
    };

    function setMemberNavState(isLoggedIn) {
      const icon = document.getElementById('member-lock-icon');
      if (icon) icon.classList.toggle('unlocked', isLoggedIn);
      document.querySelectorAll('.member-only').forEach(el => {
        el.classList.toggle('is-visible', isLoggedIn);
      });
    }

    async function loadR4sPanel() {
      const target = document.getElementById('dynamic-r4s-root');
      try {
        const res = await fetch('../Content/r4s-org_data.md');
        const text = await res.text();
        const lines = text.split('\n');

        let html = '';
        let sectionActive = false;
        let gridActive = false;
        let currentTag = 'OPERATIONS';

        lines.forEach(line => {
          line = line.trim();
          if (!line || line.startsWith('//')) return;

          if (line.startsWith('tag(')) {
            currentTag = line.match(/tag\((.+?)\)/)[1].trim();
          }
          else if (line.startsWith('## ')) {
            const heading = line.substring(3).trim();
            if (gridActive) { html += '</div>'; gridActive = false; }
            if (sectionActive) { html += '</section>'; }
            
            html += `<section class="section">
                      <div class="section-tag">${currentTag}</div>
                      <h2>${heading}</h2>`;
            sectionActive = true;
          }
          else if (line.startsWith('card(')) {
            if (!gridActive && sectionActive) { html += '<div class="tools-grid">'; gridActive = true; }
            const matches = line.match(/card\((.+?),\s*(.+?),\s*(.+?),\s*(.+?)\)/);
            if (matches) {
              const [_, title, desc, iconKey, url] = matches.map(s => s.trim());
              const svg = SVG_PRESETS[iconKey] || SVG_PRESETS.infobase;
              
              html += `
                <a class="tool-card" href="${url}" target="_blank">
                  <div class="tool-icon">${svg}</div>
                  <div>
                    <div class="tool-name">${title}</div>
                    <div class="tool-desc">${desc}</div>
                  </div>
                </a>`;
            }
          }
          else if (line.startsWith('embed(')) {
            if (gridActive) { html += '</div>'; gridActive = false; }
            const embedUrl = line.match(/embed\((.+?)\)/)[1].trim();
            html += `
              <div class="drive-embed-container">
                <iframe src="${embedUrl}"></iframe>
              </div>`;
          }
          else {
            if (gridActive) { html += '</div>'; gridActive = false; }
            html += `<p style="margin-bottom:20px; color:var(--text-muted); font-size:15px;">${line}</p>`;
          }
        });

        if (gridActive) html += '</div>';
        if (sectionActive) html += '</section>';

        target.innerHTML = html;
      } catch (err) {
        target.innerHTML = `<p style="padding:40px; color:#f87171;">Failed to load structural dynamic asset file profile layout.</p>`;
      }
    }

    function tryLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      if (user === CORRECT_USER && pass === CORRECT_PASS) {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('member-content').style.display = 'block';
        setMemberNavState(true);
        loadR4sPanel();
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    }

    function logout() { sessionStorage.removeItem(SESSION_KEY); location.reload(); }

    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('member-content').style.display = 'block';
      setMemberNavState(true);
      loadR4sPanel();
    } else {
      document.getElementById('login-gate').style.display = 'flex';
      document.getElementById('member-content').style.display = 'none';
      setMemberNavState(false);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('login-gate').style.display !== 'none') tryLogin();
    });

    // Theme Engine
    (() => {
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      const icon = btn.querySelector('.theme-toggle-icon');
      const icons = {
        light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>',
        dark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      };
      function apply(t) {
        document.documentElement.setAttribute('data-theme', t);
        if (icon) icon.innerHTML = icons[t];
      }
      apply(localStorage.getItem('etrb_launch_theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
      btn.addEventListener('click', () => {
        const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        localStorage.setItem('etrb_launch_theme', next);
        apply(next);
      });
    })();
  </script>
</body>
</html>
