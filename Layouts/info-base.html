<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content=\"width=device-width, initial-scale=1.0" />
  <title>Info Base · ETHS Rocketry</title>
  <link rel="icon" type="image/png" href="../assets/site-media/favicon.png">
  <link rel="apple-touch-icon" href="../assets/site-media/logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a; --bg-alt: #1e293b; --nav-bg: #0f172a;
      --surface: rgba(30, 41, 59, 0.4); --surface-hover: rgba(51, 65, 85, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --eths-blue: #3b82f6; --eths-orange: #f97316;
      --text: #f8fafc; --text-muted: #94a3b8;
      --font-display: 'Space Grotesk', sans-serif;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    :root[data-theme="light"] {
      --bg: #f8fafc; --bg-alt: #ffffff; --nav-bg: #f8fafc;
      --surface: rgba(241, 245, 249, 0.6); --surface-hover: rgba(226, 232, 240, 0.8);
      --border: rgba(0, 0, 0, 0.06);
      --text: #0f172a; --text-muted: #64748b;
    }
  </style>

  <style>
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--bg-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 1000px;
      height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .modal-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .control-group { display: flex; align-items: center; gap: 12px; }
    .control-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 36px; height: 36px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .control-btn:hover { background: var(--surface-hover); color: var(--eths-orange); }
    .control-btn svg { width: 18px; height: 18px; }
    .page-info, .zoom-text { font-family: var(--font-sans); font-size: 14px; color: var(--text-muted); min-width: 80px; text-align: center; }
    .pdf-viewport { flex: 1; overflow: auto; padding: 24px; display: flex; justify-content: center; align-items: flex-start; background: #0b0f19; }
    #pdf-container { display: flex; flex-direction: column; gap: 16px; align-items: center; width: 100%; }
    #pdf-container canvas { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-radius: 4px; max-width: 100%; height: auto !important; }
    
    /* Custom inner styling for markdown files inside the viewport */
    .markdown-rendered-view {
      width: 100%;
      max-width: 800px;
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.6;
      padding: 10px 20px;
      text-align: left;
    }
    .markdown-rendered-view h1 { color: var(--eths-orange); font-family: var(--font-display); margin-bottom: 1rem; border-bottom: 2px solid var(--eths-orange); padding-bottom: 0.5rem; font-size: 2rem; }
    .markdown-rendered-view h2 { color: var(--eths-blue); font-family: var(--font-display); margin-top: 1.5rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem; font-size: 1.5rem; }
    .markdown-rendered-view h3 { font-family: var(--font-display); margin-top: 1.25rem; margin-bottom: 0.5rem; font-size: 1.2rem; }
    .markdown-rendered-view p { margin-bottom: 1rem; color: var(--text); }
    .markdown-rendered-view ul { margin-left: 1.5rem; margin-bottom: 1rem; list-style-type: disc; }
    .markdown-rendered-view li { margin-bottom: 0.25rem; }
    .markdown-rendered-view code { font-family: var(--font-mono); background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; border: 1px solid var(--border); }
    .markdown-rendered-view a { color: var(--eths-blue); text-decoration: none; border-bottom: 1px dashed var(--eths-blue); }
  </style>
</head>
<body>

  <div id="pdf-modal" class="modal">
    <div class="modal-content">
      <div class="modal-controls">
        <div class="control-group" id="pdf-page-controls">
          <button id="prev-page" class="control-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <span class="page-info">Page <span id="page-num">1</span> / <span id="page-count">-</span></span>
          <button id="next-page" class="control-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
        <div class="control-group" id="pdf-zoom-controls">
          <button id="zoom-out" class="control-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
          <span id="zoom-percent" class="zoom-text">100%</span>
          <button id="zoom-in" class="control-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </button>
        </div>
        <div id="viewer-title-fallback" style="font-family: var(--font-display); font-size: 14px; color: var(--eths-orange); display: none;">Document Viewer</div>
        <button id="close-modal" class="control-btn close-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="pdf-viewport">
        <div id="pdf-container"></div>
      </div>
    </div>
  </div>

  <script>
    function setLayoutMetric(category, setting) {
      if (category === 'density') {
        localStorage.setItem('etrb_layout_density', setting);
        document.getElementById('opt-density-normal').classList.toggle('active', setting === 'normal');
        document.getElementById('opt-density-condensed').classList.toggle('active', setting === 'condensed');
        
        document.body.classList.toggle('layout-condensed', setting === 'condensed');
      } 
      else if (category === 'grid') {
        localStorage.setItem('etrb_layout_grid', setting);
        document.getElementById('opt-grid-1').classList.toggle('active', setting === '1col');
        document.getElementById('opt-grid-2').classList.toggle('active', setting === '2col');
        document.getElementById('opt-grid-3').classList.toggle('active', setting === '3col');
        
        document.body.classList.remove('layout-1col', 'layout-2col', 'layout-3col');
        document.body.classList.add(`layout-${setting}`);
      }
    }

    (() => {
      const storedDensity = localStorage.getItem('etrb_layout_density') || 'normal';
      const storedGrid = localStorage.getItem('etrb_layout_grid') || '1col';
      
      setLayoutMetric('density', storedDensity);
      setLayoutMetric('grid', storedGrid);

      document.addEventListener('click', () => {
        document.getElementById('layout-wrapper').classList.remove('active');
      });
    })();
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    let pdfDoc = null;
    let pageNum = 1;
    let currentScale = 1.25;
    const pdfContainer = document.getElementById('pdf-container');
    const modal = document.getElementById('pdf-modal');

    // Load PDF File Engine
    async function loadPDF(url) {
      pdfContainer.innerHTML = '<div style="color: var(--text-muted); font-family: var(--font-sans);">Loading PDF document...</div>';
      document.getElementById('pdf-page-controls').style.display = 'flex';
      document.getElementById('pdf-zoom-controls').style.display = 'flex';
      document.getElementById('viewer-title-fallback').style.display = 'none';
      
      try {
        pdfDoc = await pdfjsLib.getDocument(url).promise;
        document.getElementById('page-count').textContent = pdfDoc.numPages;
        pageNum = 1;
        renderPage(pageNum);
        modal.classList.add('active');
      } catch (err) {
        console.error('Error loading PDF:', err);
        pdfContainer.innerHTML = `<div style="color: #f87171; font-family: var(--font-sans); padding: 20px;">Failed to load PDF file.</div>`;
        modal.classList.add('active');
      }
    }

    // Render Specified PDF Page
    async function renderPage(num) {
      pdfContainer.innerHTML = '';
      const canvas = document.createElement('canvas');
      pdfContainer.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      
      try {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({ scale: currentScale });
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        const renderContext = { canvasContext: ctx, viewport: viewport };
        await page.render(renderContext).promise;
        document.getElementById('page-num').textContent = num;
      } catch (err) {
        console.error('Page render error:', err);
      }
    }

    // Load and Parse Markdown File Engine
    async function loadMarkdown(url) {
      pdfContainer.innerHTML = '<div style="color: var(--text-muted); font-family: var(--font-sans);">Loading Markdown document...</div>';
      document.getElementById('pdf-page-controls').style.display = 'none';
      document.getElementById('pdf-zoom-controls').style.display = 'none';
      document.getElementById('viewer-title-fallback').style.display = 'block';
      document.getElementById('viewer-title-fallback').textContent = url.split('/').pop();

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network error structural response fail');
        const rawText = await response.text();
        
        pdfDoc = null; // Flush active PDF instance
        pdfContainer.innerHTML = `<div class="markdown-rendered-view">${simpleMarkdownParse(rawText)}</div>`;
        modal.classList.add('active');
      } catch (err) {
        console.error('Error loading Markdown:', err);
        pdfContainer.innerHTML = `<div style="color: #f87171; font-family: var(--font-sans); padding: 20px;">Failed to load Markdown file.</div>`;
        modal.classList.add('active');
      }
    }

    // Lightweight clean Markdown structural converter syntax match
    function simpleMarkdownParse(md) {
      let html = md.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      html = html.replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>');
      html = html.replace(/`(.*?)`/gim, '<code>$1</code>');
      html = html.replace(/\[(.*?)\]\((.*?)\)/gim, '<a href="$2" target="_blank">$1</a>');
      
      let lines = html.split('\n');
      let inList = false;
      for (let i = 0; i < lines.length; i++) {
        let trimmed = lines[i].trim();
        if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
          let content = trimmed.substring(2);
          if (!inList) {
            lines[i] = '<ul>\n<li>' + content + '</li>';
            inList = true;
          } else {
            lines[i] = '<li>' + content + '</li>';
          }
        } else {
          if (inList) {
            lines[i] = '</ul>\n' + lines[i];
            inList = false;
          }
          if (trimmed.length > 0 && !trimmed.startsWith('<h') && !trimmed.startsWith('<div') && !trimmed.startsWith('<ul') && !trimmed.startsWith('<li')) {
            lines[i] = '<p>' + lines[i] + '</p>';
          }
        }
      }
      if (inList) lines.push('</ul>');
      return lines.join('\n');
    }

    // Control Group Event Observers
    document.getElementById('prev-page').addEventListener('click', () => {
      if (!pdfDoc || pageNum <= 1) return;
      pageNum--;
      renderPage(pageNum);
    });

    document.getElementById('next-page').addEventListener('click', () => {
      if (!pdfDoc || pageNum >= pdfDoc.numPages) return;
      pageNum++;
      renderPage(pageNum);
    });

    document.getElementById('zoom-in').addEventListener('click', () => {
      currentScale += 0.25;
      document.getElementById('zoom-percent').textContent = `${Math.round(currentScale * 100)}%`;
      if (pdfDoc) renderPage(pageNum);
    });

    document.getElementById('zoom-out').addEventListener('click', () => {
      if (currentScale <= 0.5) return;
      currentScale -= 0.25;
      document.getElementById('zoom-percent').textContent = `${Math.round(currentScale * 100)}%`;
      if (pdfDoc) renderPage(pageNum);
    });

    document.getElementById('close-modal').addEventListener('click', () => {
      modal.classList.remove('active');
      pdfContainer.innerHTML = '';
      pdfDoc = null;
    });

    // Global Event Delegation Interceptor for local site file verification
    document.addEventListener('click', function(e) {
      const anchor = e.target.closest('a');
      if (!anchor) return;
      
      const href = anchor.getAttribute('href');
      if (!href) return;
      
      const targetClean = href.split(/[?#]/)[0].toLowerCase();
      const isPdf = targetClean.endsWith('.pdf');
      const isMd = targetClean.endsWith('.md');
      
      // Strict constraint verification: Check if absolute/remote origin parameter is absent
      const isLocalSiteFile = !href.startsWith('http://') && !href.startsWith('https://') && !href.startsWith('//');
      
      if (isPdf && isLocalSiteFile) {
        e.preventDefault();
        loadPDF(href);
      } else if (isMd && isLocalSiteFile) {
        e.preventDefault();
        loadMarkdown(href);
      }
    });
  </script>
</body>
</html>
