<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info Base · ETHS Rocketry</title>
  <link rel="icon" type="image/png" href="../assets/site-media/favicon.png">
  <link rel="apple-touch-icon" href="../assets/site-media/logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a; --bg-alt: #1e293b; --nav-bg: #0f172a;
      --surface: rgba(30, 41, 59, 0.4); --surface-hover: rgba(51, 65, 85, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --eths-blue: #3b82f6; --eths-orange: #f97316;
      --text: #f8fafc; --text-muted: #94a3b8;
      --font-display: 'Space Grotesk', sans-serif;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    :root[data-theme="light"] {
      --bg: #f8fafc; --bg-alt: #f1f5f9; --nav-bg: #f8fafc;
      --surface: #ffffff; --surface-hover: #e2e8f0; --border: rgba(15, 23, 42, 0.08);
      --eths-blue: #1d4ed8; --eths-orange: #ea580c;
      --text: #0f172a; --text-muted: #475569;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-sans);
      line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ── NAV DECK ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 72px;
      background: var(--nav-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo img { width: 28px; height: 28px; object-fit: contain; }
    .nav-brand { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }

    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-muted); text-decoration: none; transition: color 0.15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .nav-links a.join-us-link {
      color: #fff; font-weight: 700; padding: 8px 18px;
      background: var(--eths-orange); border-radius: 4px;
      transition: transform 0.2s, filter 0.2s;
    }
    .nav-links a.join-us-link:hover { filter: brightness(1.05); transform: translateY(-1px); }

    /* Nav Dropdown Utility Modules */
    .dropdown { position: relative; }
    .dropdown-toggle {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--text-muted); cursor: pointer; padding: 20px 0; display: flex; align-items: center; gap: 6px; text-decoration: none;
    }
    .dropdown-toggle:hover, .dropdown.active .dropdown-toggle { color: var(--text); }
    .dropdown-content {
      display: none; position: absolute; top: 100%; left: 0; background: var(--bg-alt);
      border: 1px solid var(--border); border-radius: 6px; min-width: 240px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3); padding: 8px 0; z-index: 100;
    }
    .dropdown:hover .dropdown-content { display: block; }
    
    .dropdown-item {
      padding: 10px 20px; color: var(--text-muted); text-decoration: none; display: block; font-size: 14px; font-weight: 500; transition: background-color 0.15s, color 0.15s;
    }
    .dropdown-item:hover, .dropdown-item.active { background: var(--surface-hover); color: var(--text); }

    /* Custom Member Dropdown alignment logic */
    .member-dropdown .dropdown-content { left: auto; right: 0; min-width: 200px; }

    .member-pill { display: inline-flex; align-items: center; gap: 10px; background: rgba(148,163,184,0.05); border: 1px solid var(--border); border-radius: 4px; padding: 6px 14px; cursor: pointer; }
    .member-entry { display: inline-flex; align-items: center; gap: 6px; font-weight: 500; font-size: 13px; color: var(--text); text-decoration: none; }
    .lock-icon { width: 8px; height: 8px; background: var(--eths-orange); border-radius: 50%; }
    .lock-icon.unlocked { background: #10b981; }
    .member-only { display: none; }

    /* ── STICKY SUB-NAVBAR ── */
    .sub-navbar {
      position: sticky; top: 72px; z-index: 90;
      background: var(--bg-alt); border-bottom: 1px solid var(--border);
      padding: 0 40px; height: 64px; display: flex; align-items: center; gap: 16px;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }
    .sub-nav-sections { display: flex; gap: 32px; flex: 1; }
    .sub-nav-search { width: 280px; }
    #info-search {
      width: 100%; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: var(--font-mono); font-size: 14px;
    }

    /* ── DYNAMIC ICON-BASED LAYOUT ENGINE ── */
    .layout-dropdown-wrapper { position: relative; display: inline-block; }
    
    .layout-menu-btn {
      width: 38px; height: 38px; background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 6px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; transition: all 0.15s ease-in-out;
    }
    .layout-menu-btn:hover, .layout-dropdown-wrapper.active .layout-menu-btn {
      color: var(--text); border-color: var(--eths-orange); background: var(--surface-hover);
    }
    .layout-menu-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; }

    .layout-card {
      display: none; position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--bg-alt); border: 1px solid var(--border); border-radius: 8px;
      width: 220px; box-shadow: 0 12px 32px rgba(0,0,0,0.4); padding: 14px; z-index: 110;
    }
    .layout-dropdown-wrapper.active .layout-card { display: block; }

    .layout-card-group { margin-bottom: 12px; }
    .layout-card-group:last-child { margin-bottom: 0; }
    .layout-card-label {
      font-family: var(--font-mono); font-size: 10px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block;
    }
    .layout-btn-row { display: flex; gap: 4px; background: rgba(0,0,0,0.2); padding: 3px; border-radius: 6px; }
    
    .layout-option-btn {
      flex: 1; height: 32px; display: inline-flex; align-items: center; justify-content: center;
      background: transparent; border: none; color: var(--text-muted); border-radius: 4px;
      cursor: pointer; transition: all 0.15s;
    }
    .layout-option-btn:hover { color: var(--text); }
    .layout-option-btn.active { background: var(--eths-orange); color: #ffffff; }
    .layout-option-btn svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

    /* 1. Condensed Layout Metric Adjustments */
    body.layout-condensed .page-header { padding: 30px 0 20px 0; }
    body.layout-condensed .section { padding: 30px 0; }
    body.layout-condensed .section h2 { font-size: 22px; margin-bottom: 16px; }
    body.layout-condensed .subsection { margin-bottom: 20px; }
    body.layout-condensed .subsection h3 { margin: 20px 0 12px; font-size: 16px; }
    body.layout-condensed .doc-list { gap: 8px; }
    body.layout-condensed .doc-link { padding: 12px 20px; border-radius: 6px; }
    body.layout-condensed .doc-content h4 { font-size: 15px; margin-bottom: 2px; }
    body.layout-condensed .doc-content p { font-size: 13px; }
    body.layout-condensed .doc-link span { font-size: 20px !important; }

    /* 2. Column Configurations (Responsive Desktop Viewports) */
    @media (min-width: 768px) {
      body.layout-2col .doc-list {
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 100%;
      }
      body.layout-3col .doc-list {
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 100%;
      }
      body.layout-2col.layout-condensed .doc-list,
      body.layout-3col.layout-condensed .doc-list { gap: 8px; }
    }

    /* ── CONTENT CANVAS ── */
    .program-layout { max-width: 960px; margin: 0 auto; padding: 0 20px; transition: max-width 0.2s ease-in-out; }
    body.layout-2col .program-layout { max-width: 1140px; }
    body.layout-3col .program-layout { max-width: 1440px; }

    .page-header { padding: 60px 0 40px 0; display: flex; justify-content: space-between; align-items: flex-end; transition: padding 0.2s ease-in-out; }
    .page-eyebrow { font-family: var(--font-mono); font-size: 12px; color: var(--eths-orange); text-transform: uppercase; letter-spacing: 0.1em; }
    .page-header h1 { font-family: var(--font-display); font-size: 42px; font-weight: 700; }

    .section { padding: 60px 0; border-top: 1px solid var(--border); transition: padding 0.2s ease-in-out; }
    .section h2 { font-family: var(--font-display); font-size: 28px; font-weight: 700; margin-bottom: 32px; text-transform: uppercase; transition: font-size 0.2s; }
    .subsection { margin-bottom: 40px; transition: margin 0.2s; }
    .subsection h3 { font-family: var(--font-display); font-size: 20px; color: var(--eths-orange); margin: 40px 0 20px; transition: margin 0.2s, font-size 0.2s; }

    .doc-list { list-style: none; display: flex; flex-direction: column; gap: 16px; max-width: 860px; transition: gap 0.2s; }
    body.layout-2col .doc-list, body.layout-3col .doc-list { max-width: 100%; }

    .doc-item { transition: all 0.2s; }
    .doc-link {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 24px; display: flex; justify-content: space-between; align-items: center;
      text-decoration: none; color: inherit; transition: all 0.2s;
    }
    .doc-link:hover { border-color: var(--eths-orange); background: var(--surface-hover); transform: translateY(-1px); }

    .doc-content h4 { font-size: 18px; margin-bottom: 6px; transition: font-size 0.2s; }
    .doc-content p { color: var(--text-muted); font-size: 15px; line-height: 1.5; transition: font-size 0.2s; }

    .logout-btn {
      font-family: var(--font-mono); font-size: 13px; padding: 8px 16px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 6px; cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .logout-btn:hover { border-color: var(--eths-orange); color: var(--text); }

    .theme-toggle {
      width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); background: var(--surface); border-radius: 4px;
      color: var(--text-muted); cursor: pointer; transition: border-color 0.15s, color 0.15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--eths-orange); }
    .theme-toggle-icon { width: 16px; height: 16px; display: inline-flex; }
    .theme-toggle-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

    footer { border-top: 1px solid var(--border); padding: 40px 0; margin-top: 80px; display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

    @media (max-width: 900px) {
      nav, .sub-navbar { padding: 0 20px; }
      .sub-nav-sections { gap: 20px; }
    }
  </style>
  <script src="default.js"></script>
</head>
<body>
  <div id="site-nav"></div>

  <div class="sub-navbar">
    <div class="sub-nav-sections" id="sub-nav-sections"></div>
    <div class="sub-nav-search">
      <input type="text" id="info-search" placeholder="Search resources..." onkeyup="filterEntries()">
    </div>
    
    <div class="layout-dropdown-wrapper" id="layout-wrapper">
      <button class="layout-menu-btn" onclick="toggleLayoutMenu(event)" title="Adjust Layout Configurations">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1"></rect><rect x="14" y="3" width="7" height="5" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect><rect x="3" y="16" width="7" height="5" rx="1"></rect></svg>
      </button>
      
      <div class="layout-card" onclick="event.stopPropagation()">
        <div class="layout-card-group">
          <span class="layout-card-label">Density</span>
          <div class="layout-btn-row">
            <button id="opt-density-normal" class="layout-option-btn active" onclick="setLayoutMetric('density', 'normal')" title="Normal Density">
              <svg viewBox="0 0 24 24"><line x1="5" y1="6" x2="19" y2="6"></line><line x1="5" y1="12" x2="19" y2="12"></line><line x1="5" y1="18" x2="19" y2="18"></line></svg>
            </button>
            <button id="opt-density-condensed" class="layout-option-btn" onclick="setLayoutMetric('density', 'condensed')" title="Condensed Density">
              <svg viewBox="0 0 24 24"><line x1="4" y1="4" x2="20" y2="4"></line><line x1="4" y1="8" x2="20" y2="8"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="16" x2="20" y2="16"></line><line x1="4" y1="20" x2="20" y2="20"></line></svg>
            </button>
          </div>
        </div>
        <div class="layout-card-group">
          <span class="layout-card-label">Columns</span>
          <div class="layout-btn-row">
            <button id="opt-grid-1" class="layout-option-btn active" onclick="setLayoutMetric('grid', '1col')" title="Single Column Grid">
              <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"></rect><line x1="4" y1="12" x2="20" y2="12"></line></svg>
            </button>
            <button id="opt-grid-2" class="layout-option-btn" onclick="setLayoutMetric('grid', '2col')" title="Double Column Grid">
              <svg viewBox="0 0 24 24"><rect x="3" y="4" width="8" height="16" rx="2"></rect><rect x="13" y="4" width="8" height="16" rx="2"></rect></svg>
            </button>
            <button id="opt-grid-3" class="layout-option-btn" onclick="setLayoutMetric('grid', '3col')" title="Triple Column Grid">
              <svg viewBox="0 0 24 24"><rect x="2" y="4" width="5" height="16" rx="1"></rect><rect x="9" y="4" width="6" height="16" rx="1"></rect><rect x="17" y="4" width="5" height="16" rx="1"></rect></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <main class="program-layout">
    <div id="login-gate" style="min-height: calc(100vh - 136px); display: flex; align-items: center; justify-content: center;">
      <div style="background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 48px 40px; max-width: 400px; width: 100%;">
        <h1 style="font-family: var(--font-display); font-size: 28px;">Member Access</h1>
        <p style="color: var(--text-muted); margin-bottom: 20px;">Sign in to access the Info Base.</p>
        <div style="margin: 24px 0;">
          <label style="font-family: var(--font-mono); font-size: 12px; display:block; margin-bottom:6px;">Username</label>
          <input type="text" id="username" placeholder="member" style="width:100%; padding:12px 16px; background:var(--bg-alt); border:1px solid var(--border); border-radius:6px; color:var(--text); outline: none;">
        </div>
        <div style="margin-bottom: 24px;">
          <label style="font-family: var(--font-mono); font-size: 12px; display:block; margin-bottom:6px;">Password</label>
          <input type="password" id="password" placeholder="••••••••" style="width:100%; padding:12px 16px; background:var(--bg-alt); border:1px solid var(--border); border-radius:6px; color:var(--text); outline: none;">
        </div>
        <div id="error-msg" style="display:none; color:#f87171; font-family:var(--font-mono); margin-bottom: 16px; font-size:13px;">Incorrect username or password.</div>
        <button onclick="tryLogin()" style="width:100%; padding:14px; background:var(--eths-orange); color:white; border:none; border-radius:6px; font-weight:700; cursor:pointer;">Sign In</button>
      </div>
    </div>

    <div id="member-content" style="display:none;">
      <div class="page-header">
        <div>
          <div class="page-eyebrow">MEMBERS ONLY</div>
          <h1>Info Base</h1>
        </div>
      </div>
      <div id="dynamic-content"></div>
    </div>

    <footer>
      <div>ETHS Rocketry</div>
      <div>Evanston Township High School // 2026</div>
    </footer>
  </main>

  <script>
    const SESSION_KEY = 'etrb_auth';
    const CORRECT_USER = 'member';
    const CORRECT_PASS = 'rktpass1';

    function setMemberNavState(isLoggedIn) {
      const icon = document.getElementById('member-lock-icon');
      if (icon) icon.classList.toggle('unlocked', isLoggedIn);
      document.querySelectorAll('.member-only').forEach(el => {
        el.classList.toggle('is-visible', isLoggedIn);
      });
    }

    function filterEntries() {
      const query = document.getElementById('info-search').value.toLowerCase().trim();
      const sections = document.querySelectorAll('.section');

      sections.forEach(section => {
        let sectionHasMatches = false;
        const subsections = section.querySelectorAll('.subsection');

        subsections.forEach(sub => {
          let subHasMatches = false;
          const items = sub.querySelectorAll('.doc-item');

          items.forEach(item => {
            if (query === "") {
              item.style.display = '';
              subHasMatches = true;
            } else {
              const text = item.textContent.toLowerCase();
              if (text.includes(query)) {
                item.style.display = '';
                subHasMatches = true;
              } else {
                item.style.display = 'none';
              }
            }
          });

          if (subHasMatches) {
            sub.style.display = '';
            sectionHasMatches = true;
          } else {
            sub.style.display = 'none';
          }
        });

        section.style.display = sectionHasMatches ? '' : 'none';
      });
    }

    async function loadInfoBase() {
      const container = document.getElementById('dynamic-content');
      const subNav = document.getElementById('sub-nav-sections');

      try {
        const res = await fetch('../Content/info-base_data.md');
        const text = await res.text();
        const lines = text.split('\n');

        let html = '';
        let currentSectionId = '';
        let isFirstSection = true;
        let isListOpen = false;
        let navStructure = []; 

        lines.forEach(line => {
          line = line.trim();
          if (!line || line.startsWith('//')) return;

          if (line.startsWith('# ')) {
            const headingContent = line.substring(2).trim();
            let title = headingContent;
            let nickname = headingContent;

            if (headingContent.includes('|')) {
              const parts = headingContent.split('|');
              title = parts[0].trim();
              nickname = parts[1].trim();
            }

            currentSectionId = 'sec-' + nickname.toLowerCase().replace(/\s+/g, '-');
            
            if (isListOpen) {
              html += '</ul></div>';
              isListOpen = false;
            }
            if (!isFirstSection) {
              html += '</section>';
            }
            isFirstSection = false;
            
            html += `<section class="section" id="${currentSectionId}"><h2>${title}</h2>`;
            
            navStructure.push({
              id: currentSectionId,
              nickname: nickname,
              subsections: []
            });
          } 
          else if (line.startsWith('## ')) {
            const subtitle = line.substring(3).trim();
            const subId = currentSectionId + '-' + subtitle.toLowerCase().replace(/\s+/g, '-');
            
            if (isListOpen) {
              html += '</ul></div>';
            }
            
            html += `<div class="subsection" id="${subId}"><h3>${subtitle}</h3><ul class="doc-list">`;
            isListOpen = true;
            
            if (navStructure.length > 0) {
              navStructure[navStructure.length - 1].subsections.push({
                id: subId,
                title: subtitle
              });
            }
          } 
          else if (line.startsWith('link(')) {
            const m = line.match(/link\((.+?),\s*(.+?),\s*(.+?),\s*(.+)\)/);
            if (m) {
              const [_, title, desc, type, url] = m.map(s => s.trim());
              html += `
                <li class="doc-item">
                  <a class="doc-link" href="${url}" target="_blank">
                    <div class="doc-content">
                      <h4>${title}</h4>
                      <p>${desc}</p>
                    </div>
                    <span style="font-size:28px; color:var(--eths-blue); font-family:var(--font-display); transition: font-size 0.2s;">→</span>
                  </a>
                </li>`;
            }
          }
        });

        if (isListOpen) html += '</ul></div>';
        if (!isFirstSection) html += '</section>';

        container.innerHTML = html;

        let navHTML = '';
        navStructure.forEach(sec => {
          let dropdownItems = '';
          sec.subsections.forEach(sub => {
            dropdownItems += `<a href="#${sub.id}" class="dropdown-item">${sub.title}</a>`;
          });

          navHTML += `
            <div class="dropdown">
              <a href="#${sec.id}" class="dropdown-toggle">${sec.nickname} ▾</a>
              <div class="dropdown-content">
                ${dropdownItems}
              </div>
            </div>`;
        });
        subNav.innerHTML = navHTML;

      } catch (e) {
        container.innerHTML = `<p style="padding:60px; color:#f87171;">Failed to load payload profile data.</p>`;
      }
    }

    function tryLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      if (user === CORRECT_USER && pass === CORRECT_PASS) {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('login-gate').style.display = 'none';
        document.getElementById('member-content').style.display = 'block';
        setMemberNavState(true);
        loadInfoBase();
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    }

    function logout() { sessionStorage.removeItem(SESSION_KEY); location.reload(); }

    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('member-content').style.display = 'block';
      setMemberNavState(true);
      loadInfoBase();
    } else setMemberNavState(false);

    // Theme Engine
    (() => {
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      const icon = btn.querySelector('.theme-toggle-icon');
      const icons = {
        light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>',
        dark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      };
      function apply(t) {
        document.documentElement.setAttribute('data-theme', t);
        if (icon) icon.innerHTML = icons[t];
      }
      const saved = localStorage.getItem('etrb_launch_theme');
      apply(saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'));
      btn.addEventListener('click', () => {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'light' ? 'dark' : 'light';
        localStorage.setItem('etrb_launch_theme', next);
        apply(next);
      });
    })();

    // ── LAYOUT SELECTION ARCHITECTURE CONFIGURATION ──
    function toggleLayoutMenu(event) {
      event.stopPropagation();
      document.getElementById('layout-wrapper').classList.toggle('active');
    }

    function setLayoutMetric(category, setting) {
      if (category === 'density') {
        localStorage.setItem('etrb_layout_density', setting);
        document.getElementById('opt-density-normal').classList.toggle('active', setting === 'normal');
        document.getElementById('opt-density-condensed').classList.toggle('active', setting === 'condensed');
        
        document.body.classList.toggle('layout-condensed', setting === 'condensed');
      } 
      else if (category === 'grid') {
        localStorage.setItem('etrb_layout_grid', setting);
        document.getElementById('opt-grid-1').classList.toggle('active', setting === '1col');
        document.getElementById('opt-grid-2').classList.toggle('active', setting === '2col');
        document.getElementById('opt-grid-3').classList.toggle('active', setting === '3col');
        
        document.body.classList.remove('layout-1col', 'layout-2col', 'layout-3col');
        document.body.classList.add(`layout-${setting}`);
      }
    }

    // Initialize layout setup engines from state cache entries
    (() => {
      const storedDensity = localStorage.getItem('etrb_layout_density') || 'normal';
      const storedGrid = localStorage.getItem('etrb_layout_grid') || '1col';
      
      setLayoutMetric('density', storedDensity);
      setLayoutMetric('grid', storedGrid);

      document.addEventListener('click', () => {
        document.getElementById('layout-wrapper').classList.remove('active');
      });
    })();
  </script>
</body>
</html>
