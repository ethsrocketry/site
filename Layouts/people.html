<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETHS Rocketry - People</title>
  <link rel="icon" type="image/png" href="../site-media/favicon.png">
  <link rel="apple-touch-icon" href="../site-media/logo.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --bg-alt: #1e293b;
      --nav-bg: #0f172a;
      --surface: rgba(30, 41, 59, 0.4);
      --surface-hover: rgba(51, 65, 85, 0.6);
      --border: rgba(255, 255, 255, 0.08);

      --eths-blue: #3b82f6;
      --eths-orange: #f97316;
      --orange-glow: rgba(249, 115, 22, 0.1);

      --text: #f8fafc;
      --text-muted: #94a3b8;

      --font-display: 'Space Grotesk', sans-serif;
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --modal-canvas-bg: #0b0f19;
      --site-nav-height: 72px;
    }

    :root[data-theme="light"] {
      --bg: #f8fafc;
      --bg-alt: #f1f5f9;
      --nav-bg: #f8fafc;
      --surface: #ffffff;
      --surface-hover: #e2e8f0;
      --border: rgba(15, 23, 42, 0.08);

      --eths-blue: #1d4ed8;
      --eths-orange: #ea580c;
      --orange-glow: rgba(234, 88, 12, 0.05);

      --text: #0f172a;
      --text-muted: #475569;
      --modal-canvas-bg: #e2e8f0;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar,
    .viewport-window-body::-webkit-scrollbar { 
      width: 8px; 
      height: 0px;
    }
    html::-webkit-scrollbar-track,
    body::-webkit-scrollbar-track,
    .viewport-window-body::-webkit-scrollbar-track { 
      background: transparent; 
    }
    html::-webkit-scrollbar-thumb,
    body::-webkit-scrollbar-thumb,
    .viewport-window-body::-webkit-scrollbar-thumb { 
      background: var(--text-muted); 
      border-radius: 4px; 
      opacity: 0.4;
    }
    html::-webkit-scrollbar-thumb:hover,
    body::-webkit-scrollbar-thumb:hover,
    .viewport-window-body::-webkit-scrollbar-thumb:hover { 
      background: var(--eths-orange); 
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 72px;
      background: var(--nav-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo img { width: 28px; height: 28px; object-fit: contain; }
    .nav-brand { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }

    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-muted); text-decoration: none; transition: color 0.15s ease; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .nav-links a.join-us-link {
      color: #fff; font-weight: 700; padding: 8px 18px;
      background: var(--eths-orange); border-radius: 4px;
      box-shadow: 0 4px 15px var(--orange-glow);
      transition: transform 0.2s, filter 0.2s;
    }
    .nav-links a.join-us-link:hover { filter: brightness(1.05); transform: translateY(-1px); }

    .member-pill {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(148, 163, 184, 0.05); border: 1px solid var(--border); border-radius: 4px; padding: 6px 14px;
    }
    .member-entry { display: inline-flex; align-items: center; gap: 6px; font-weight: 500; font-size: 13px; text-decoration: none; color: var(--text); }
    .lock-icon { width: 8px; height: 8px; background: var(--eths-orange); border-radius: 50%; display: inline-block; }
    .lock-icon.unlocked { background: #10b981; }
    .member-only { display: none; font-size: 13px !important; margin-left: 8px; }

    .theme-toggle {
      width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); background: var(--surface); border-radius: 4px; color: var(--text-muted); cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--eths-orange); }
    .theme-toggle-icon { width: 16px; height: 16px; display: inline-flex; }
    .theme-toggle-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; }

    /* ── SEARCH BAR ── */
    .search-bar-wrap {
      padding: 20px 40px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-alt);
    }
    #people-search {
      width: 100%;
      max-width: 400px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #people-search::placeholder { color: var(--text-muted); }
    #people-search:focus {
      border-color: var(--eths-orange);
      background: var(--surface-hover);
    }

    /* ── LAYOUT ── */
    .people-layout-container {
      display: flex;
      gap: 48px;
      max-width: 1300px;
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    /* ── SIDEBAR ── */
    .people-sidebar {
      width: 200px;
      flex-shrink: 0;
      position: sticky;
      top: 88px;
      height: fit-content;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sidebar-title {
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      border-radius: 4px;
      border: 1px solid transparent;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 12px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .sidebar-link:hover {
      color: var(--text);
      background: var(--surface);
      border-color: var(--border);
    }
    .sidebar-link .badge {
      font-size: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1px 7px;
      border-radius: 3px;
      color: var(--text-muted);
    }
    .sidebar-link:hover .badge {
      color: var(--eths-orange);
      border-color: var(--eths-orange);
    }

    /* ── PEOPLE FEED ── */
    .people-wrap { flex-grow: 1; display: flex; flex-direction: column; gap: 56px; }

    .people-section { scroll-margin-top: 88px; }
    .people-section h2 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .section-count {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 3px;
      padding: 2px 8px;
      text-transform: none;
    }

    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .person-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
    }
    .person-card:hover {
      border-color: var(--eths-orange);
      background: var(--surface-hover);
      transform: translateY(-2px);
    }
    .person-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg-alt);
    }
    .person-name {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
    }
    
    /* ── BADGES SYSTEM ── */
    .person-badges-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: -4px;
    }

    .person-class-year {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--eths-orange);
      background: var(--orange-glow);
      border: 1px solid rgba(249, 115, 22, 0.25);
      padding: 2px 8px;
      border-radius: 3px;
    }
    :root[data-theme="light"] .person-class-year {
      border-color: rgba(234, 88, 12, 0.3);
    }

    .person-badge-founder {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
      padding: 2px 8px;
      border-radius: 3px;
    }
    :root[data-theme="light"] .person-badge-founder {
      color: #b45309;
      border-color: rgba(180, 83, 9, 0.3);
    }

    .person-badge-cofounder {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #cbd5e1;
      background: rgba(203, 213, 225, 0.1);
      border: 1px solid rgba(203, 213, 225, 0.3);
      padding: 2px 8px;
      border-radius: 3px;
    }
    :root[data-theme="light"] .person-badge-cofounder {
      color: #475569;
      border-color: rgba(71, 85, 105, 0.3);
    }

    .person-badge-program {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--eths-blue);
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.3);
      padding: 2px 8px;
      border-radius: 3px;
    }
    :root[data-theme="light"] .person-badge-program {
      color: #1e40af;
      border-color: rgba(30, 64, 175, 0.3);
    }

    .person-bio {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      flex-grow: 1;
    }
    .person-contacts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 30px;
      align-items: center;
    }
    .contact-link {
      width: 30px;
      height: 30px;
      border-radius: 4px;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: var(--bg-alt);
      transition: color 0.15s, border-color 0.15s;
    }
    .contact-link svg { width: 15px; height: 15px; }
    .contact-link:hover {
      color: var(--eths-orange);
      border-color: var(--eths-orange);
    }

    /* ── SYSTEM MODAL HUD ARCHITECTURE (INSPIRED BY ARC.HTML) ── */
    .viewport-overlay-frame { 
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; 
      background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); 
      z-index: 1000; display: flex; align-items: center; justify-content: center; 
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease; padding: 40px; 
    }
    .viewport-overlay-frame.active { opacity: 1; pointer-events: auto; }
    .viewport-window-box { 
      width: 100%; max-width: 680px; height: auto; max-height: 85vh; 
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px; 
      display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
    }
    .viewport-window-header { 
      height: 56px; background: var(--bg-alt); border-bottom: 1px solid var(--border); 
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; 
    }
    .viewport-window-title { font-family: var(--font-display); font-size: 14px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.05em; }
    .viewport-window-close { 
      background: transparent; border: 1px solid var(--border); color: var(--text-muted); 
      font-family: var(--font-mono); font-size: 11px; height: 28px; padding: 0 12px; border-radius: 4px; 
      cursor: pointer; text-transform: uppercase; display: inline-flex; align-items: center; justify-content: center; 
      transition: color 0.15s ease, border-color 0.15s ease; 
    }
    .viewport-window-close:hover { color: var(--text); border-color: var(--eths-orange); }
    .viewport-window-body { 
      flex: 1; width: 100%; height: 100%; background: var(--modal-canvas-bg); 
      overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 24px; 
    }

    /* Modal Layout Elements */
    .modal-profile-hero { display: flex; gap: 24px; align-items: flex-start; }
    .modal-photo { width: 160px; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-alt); flex-shrink: 0; }
    .modal-meta-box { display: flex; flex-direction: column; gap: 12px; }
    .modal-name { font-family: var(--font-display); font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.1; }
    .modal-bio { font-family: var(--font-mono); font-size: 13px; color: var(--text); line-height: 1.7; border-top: 1px solid var(--border); padding-top: 16px; }

    .no-results {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-muted);
      padding: 40px 0;
    }

    footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding: 40px 0; margin: 0 40px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    @media (max-width: 900px) {
      .people-layout-container { flex-direction: column; gap: 24px; padding: 24px 20px 60px; }
      .people-sidebar { position: static; width: 100%; flex-direction: row; flex-wrap: wrap; gap: 6px; }
      .sidebar-title { width: 100%; }
      nav { padding: 0 20px; }
      .search-bar-wrap { padding: 16px 20px; }
      footer { margin: 0 20px; }
      .viewport-overlay-frame { padding: 16px; }
      .modal-profile-hero { flex-direction: column; align-items: center; text-align: center; gap: 16px; }
      .modal-profile-hero .person-badges-container { justify-content: center; }
    }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      footer { flex-direction: column; gap: 16px; text-align: center; }
    }
  </style>
  <script src="default.js"></script>
</head>
<body>
  <div id="site-nav"></div>

  <div class="search-bar-wrap">
    <input type="text" id="people-search" placeholder="Search people..." aria-label="Search people entries">
  </div>

  <div class="people-layout-container">
    <aside class="people-sidebar" id="people-directory">
      <div class="sidebar-title">Directory</div>
    </aside>
    <main class="people-wrap" id="people-content">
      <p class="no-results">Loading people data...</p>
    </main>
  </div>

  <div class="viewport-overlay-frame" id="system-people-modal" onclick="dismissSystemModal(event)">
    <div class="viewport-window-box">
      <div class="viewport-window-header">
        <span class="viewport-window-title" id="system-modal-header-title">Personnel Profile Viewer</span>
        <button class="viewport-window-close" onclick="closeProfileViewer()">Close [ESC]</button>
      </div>
      <div class="viewport-window-body" id="system-modal-scrollbody">
        </div>
    </div>
  </div>

  <footer>
    <div>ETHS Rocketry</div>
    <div>Evanston Township High School // 2026</div>
  </footer>

  <script>
    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function slugify(text) {
      return text.toString().toLowerCase().trim()
        .replace(/\s+/g, '-')
        .replace(/[^\w\-]+/g, '');
    }

    function splitArgs(raw) {
      const args = [];
      let current = '';
      let inQuote = false;
      for (const ch of raw) {
        if (ch === '"') { inQuote = !inQuote; continue; }
        if (ch === ',' && !inQuote) { args.push(current.trim()); current = ''; }
        else { current += ch; }
      }
      if (current) args.push(current.trim());
      return args;
    }

    function iconFor(method) {
      const m = method.toLowerCase();
      if (m === 'linkedin') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.94 8.5H3.56V20h3.38V8.5Zm.22-3.54A1.96 1.96 0 1 0 3.24 5a1.96 1.96 0 0 0 3.92-.04ZM20.76 13.44c0-3.46-1.85-5.07-4.32-5.07a3.74 3.74 0 0 0-3.35 1.84V8.5H9.72V20h3.37v-6.05c0-1.6.3-3.15 2.28-3.15 1.95 0 1.98 1.82 1.98 3.25V20h3.41v-6.56Z"/></svg>';
      if (m === 'github')   return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.22c0 4.5 2.87 8.32 6.84 9.66.5.1.68-.22.68-.49 0-.24-.01-1.03-.01-1.86-2.78.62-3.36-1.21-3.36-1.21-.46-1.19-1.11-1.5-1.11-1.5-.9-.63.07-.62.07-.62 1 .07 1.52 1.04 1.52 1.04.89 1.56 2.32 1.11 2.88.85.09-.66.35-1.11.64-1.36-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.73 0 0 .84-.28 2.75 1.05A9.27 9.27 0 0 1 12 7.1a9.3 9.3 0 0 1 2.5.35c1.9-1.33 2.74-1.05 2.74-1.05.56 1.42.2 2.47.11 2.73.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.6.69.49A10.23 10.23 0 0 0 22 12.22C22 6.58 17.52 2 12 2Z"/></svg>';
      if (m === 'email')    return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1-1-1Zm9 7 8-5H4l8 5Zm0 2-8-5v8h16V9l-8 5Z"/></svg>';
      if (m === 'instagram') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3H7Zm11.5 1.5a1 1 0 1 1-1 1 1 1 0 0 1 1-1ZM12 7a5 5 0 1 1-5 5 5 5 0 0 1 5-5Zm0 2a3 3 0 1 0 3 3 3 3 0 0 0-3-3Z"/></svg>';
      return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 3h7v7h-2V6.41l-8.29 8.3-1.42-1.42 8.3-8.29H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"/></svg>';
    }

    // Stores global incremental index tracking identities for cross-referencing on mod clicks
    let personIdCounter = 0;
    const globalPeopleRegistryMap = new Map();

    function parsePeople(md) {
      const lines = md.split('\n');
      const sections = [];
      let currentSection = null;
      let currentPerson = null;

      function pushPerson() {
        if (!currentSection || !currentPerson) return;
        currentSection.people.push(currentPerson);
        currentPerson = null;
      }

      for (const lineRaw of lines) {
        const line = lineRaw.trim();
        if (!line || line.startsWith('//')) continue;

        if (line.startsWith('section(') && line.endsWith(')')) {
          pushPerson();
          const title = line.slice(8, -1).trim();
          currentSection = { title, people: [] };
          sections.push(currentSection);
          continue;
        }

        if (line.startsWith('person(') && line.endsWith(')')) {
          pushPerson();
          if (!currentSection) continue;
          const args = splitArgs(line.slice(7, -1));
          
          personIdCounter++;
          currentPerson = {
            id: personIdCounter,
            name: args[0] || 'Unnamed',
            image: args[1] || '../people-media/wip-square.svg',
            bio: args[2] || 'Bio coming soon.',
            classYear: args[3] || '',
            contacts: []
          };
          globalPeopleRegistryMap.set(personIdCounter.toString(), currentPerson);
          continue;
        }

        if (line.startsWith('contact(') && line.endsWith(')') && currentPerson) {
          const args = splitArgs(line.slice(8, -1));
          if (args[0] && args[1]) {
            currentPerson.contacts.push({ method: args[0], url: args[1] });
          }
          continue;
        }

        if (line === 'endperson') pushPerson();
      }
      pushPerson();

      // ── AUTO-SORTING LOGIC ──
      sections.forEach(section => {
        section.people.sort((a, b) => {
          const yearAMatch = a.classYear.match(/\b\d{4}\b/);
          const yearBMatch = b.classYear.match(/\b\d{4}\b/);
          const yearA = yearAMatch ? parseInt(yearAMatch[0], 10) : Infinity;
          const yearB = yearBMatch ? parseInt(yearBMatch[0], 10) : Infinity;

          if (yearA !== yearB) return yearA - yearB; 

          const getRoleScore = (classYearStr) => {
            const low = classYearStr.toLowerCase();
            if (low.includes('co-founder')) return 2;
            if (low.includes('founder')) return 1;
            return 3; 
          };
          return getRoleScore(a.classYear) - getRoleScore(b.classYear);
        });
      });

      return sections;
    }

    function generateBadgeHtml(badgeString, allowProgramBadges = true) {
      if (!badgeString) return '';
      const tokens = badgeString.split(/[,/]+/).map(b => b.trim()).filter(Boolean);
      
      return tokens.map(badge => {
        const lowerBadge = badge.toLowerCase();
        if (lowerBadge.includes('co-founder')) {
          return `<div class="person-badge-cofounder">${escapeHtml(badge)}</div>`;
        } else if (lowerBadge.includes('founder')) {
          return `<div class="person-badge-founder">${escapeHtml(badge)}</div>`;
        } else if (/\b\d{4}\b/.test(badge) || lowerBadge.includes('class')) {
          return `<div class="person-class-year">${escapeHtml(badge)}</div>`;
        } else if (allowProgramBadges) {
          return `<div class="person-badge-program">${escapeHtml(badge)}</div>`;
        }
        return '';
      }).join('');
    }

    function sectionCountLabel(title, count) {
      const t = title.toLowerCase();
      if (t.includes('alumni')) return `${count} alumni`;
      if (t.includes('member')) return `${count} members`;
      return `${count} entries`;
    }

    function renderSidebar(sections) {
      const sidebar = document.getElementById('people-directory');
      if (!sidebar) return;
      const linksHtml = sections.map(section => {
        const targetId = slugify(section.title);
        return `<a href="#${targetId}" class="sidebar-link">
          <span>${escapeHtml(section.title)}</span>
          <span class="badge">${section.people.length}</span>
        </a>`;
      }).join('');
      sidebar.innerHTML = '<div class="sidebar-title">Directory</div>' + linksHtml;
    }

    function renderPeopleSections(sections) {
      if (!sections.length) return '<p class="no-results">No people data found.</p>';

      return sections.map(section => {
        const sectionId = slugify(section.title);
        const peopleHtml = section.people.map(person => {
          const contacts = person.contacts.length
            ? person.contacts.map(c => `<a class="contact-link" href="${escapeHtml(c.url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation();" aria-label="${escapeHtml(c.method)}">${iconFor(c.method)}</a>`).join('')
            : `<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">contact info coming soon</span>`;

          const primaryBadgesHtml = generateBadgeHtml(person.classYear, false);
          const badgesContainer = primaryBadgesHtml ? `<div class="person-badges-container">${primaryBadgesHtml}</div>` : '';

          return `<article class="person-card" onclick="launchProfileViewer('${person.id}', '${escapeHtml(section.title)}')">
            <img class="person-photo" src="${escapeHtml(person.image)}" alt="Photo of ${escapeHtml(person.name)}" />
            <h3 class="person-name">${escapeHtml(person.name)}</h3>
            ${badgesContainer}
            <p class="person-bio">${escapeHtml(person.bio)}</p>
            <div class="person-contacts">${contacts}</div>
          </article>`;
        }).join('');

        return `<section class="people-section" id="${sectionId}">
          <h2>${escapeHtml(section.title)} <span class="section-count">${sectionCountLabel(section.title, section.totalCount)}</span></h2>
          <div class="people-grid">${peopleHtml}</div>
        </section>`;
      }).join('');
    }

    /* ── PROFILE MODAL CONTROLS (ARC DESIGN LANGUAGE MATCH) ── */
    function launchProfileViewer(personId, sectionTitle = '') {
      const person = globalPeopleRegistryMap.get(personId.toString());
      if (!person) return;

      const modal = document.getElementById('system-people-modal');
      const container = document.getElementById('system-modal-scrollbody');
      const titleElement = document.getElementById('system-modal-header-title');
      if (!modal || !container || !titleElement) return;

      // Robust Dynamic Header Classification Configuration
      let viewerTitle = 'Member';
      const secLow = sectionTitle.toLowerCase();
      if (secLow.includes('alumni')) {
        viewerTitle = 'Alum';
      } else if (secLow.includes('teacher') || secLow.includes('faculty') || secLow.includes('mentor') || secLow.includes('advisor')) {
        viewerTitle = 'Teacher';
      }
      titleElement.textContent = viewerTitle;

      const contactsHtml = person.contacts.length
        ? person.contacts.map(c => `<a class="contact-link" href="${escapeHtml(c.url)}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(c.method)}">${iconFor(c.method)}</a>`).join('')
        : `<span style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">Contact information pending template upload</span>`;

      const completeBadgesHtml = generateBadgeHtml(person.classYear, true);

      container.innerHTML = `
        <div class="modal-profile-hero">
          <img class="modal-photo" src="${escapeHtml(person.image)}" alt="Enlarged photo view of ${escapeHtml(person.name)}" />
          <div class="modal-meta-box">
            <h2 class="modal-name">${escapeHtml(person.name)}</h2>
            <div class="person-badges-container" style="margin-top: 4px;">
              ${completeBadgesHtml}
            </div>
            <div class="person-contacts" style="margin-top: 8px;">
              ${contactsHtml}
            </div>
          </div>
        </div>
        <div class="modal-bio">
          <p>${escapeHtml(person.bio)}</p>
        </div>
      `;

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeProfileViewer() {
      const modal = document.getElementById('system-people-modal');
      if (modal) modal.classList.remove('active');
      document.body.style.overflow = '';
    }

    function dismissSystemModal(e) { 
      if (e.target.id === 'system-people-modal') closeProfileViewer(); 
    }

    window.addEventListener('keydown', (e) => { 
      if (e.key === 'Escape') closeProfileViewer();
    });

    let allSections = [];

    function filterPeople() {
      const query = (document.getElementById('people-search')?.value || '').trim().toLowerCase();
      const filteredSections = allSections
        .map(section => {
          const filteredPeople = query
            ? section.people.filter(person => {
                const blob = `${section.title} ${person.name} ${person.bio} ${person.classYear}`.toLowerCase();
                return blob.includes(query);
              })
            : section.people;
          return { title: section.title, people: filteredPeople, totalCount: section.people.length };
        })
        .filter(section => section.people.length > 0);

      document.getElementById('people-content').innerHTML = filteredSections.length
        ? renderPeopleSections(filteredSections)
        : '<p class="no-results">No matching people found.</p>';

      renderSidebar(filteredSections);
    }

    fetch('../Content/people_data.md')
      .then(res => res.text())
      .then(md => {
        allSections = parsePeople(md);
        filterPeople();
      })
      .catch(() => {
        document.getElementById('people-content').innerHTML = '<p class="no-results">Could not load people data.</p>';
      });

    document.getElementById('people-search')?.addEventListener('input', filterPeople);
  </script>

  <script>
    const SESSION_KEY = 'etrb_auth';
    function setMemberNavState(isLoggedIn) {
      const icon = document.getElementById('member-lock-icon');
      if (icon) icon.classList.toggle('unlocked', isLoggedIn);
      document.querySelectorAll('.member-only').forEach(el => {
        el.classList.toggle('is-visible', isLoggedIn);
      });
    }
    setMemberNavState(sessionStorage.getItem(SESSION_KEY) === '1');
  </script>

  <script>
    (() => {
      const THEME_KEY = 'etrb_launch_theme';
      const toggleBtn = document.getElementById('theme-toggle');
      if (!toggleBtn) return;
      const icon = toggleBtn.querySelector('.theme-toggle-icon');

      const icons = {
        light: '<svg viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/></svg>',
        dark: '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      };

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        if (icon) icon.innerHTML = icons[theme] || icons.dark;
      }

      const savedTheme = localStorage.getItem(THEME_KEY);
      const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      applyTheme(savedTheme || (prefersLight ? 'light' : 'dark'));

      toggleBtn.addEventListener('click', () => {
        const nextTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        localStorage.setItem(THEME_KEY, nextTheme);
        applyTheme(nextTheme);
      });
    })();

    function logout() {
      sessionStorage.removeItem(SESSION_KEY);
      setMemberNavState(false);
    }
  </script>
</body>
</html>
