<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ETHS Rocketry</title>
  <link rel="icon" type="image/png" href="etrb-logo.png">
  <link rel="apple-touch-icon" href="etrb-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #4f9cf9;
      --accent-dim: rgba(79, 156, 249, 0.18);
      --accent-border: rgba(79, 156, 249, 0.35);
      --bg: #08090f;
      /* New Sky Blue Palette */
      --sky-top: #6db1ff;
      --sky-bottom: #b0d4ff;
      --bg3: #111420;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #e8ecf8;
      --text-muted: rgba(232,236,248,0.7);
      --text-faint: rgba(232,236,248,0.4);
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      line-height: 1.6;
    }

    /* ── NAV (Kept consistent) ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 58px;
      background: rgba(8,9,15,0.8);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-brand { font-size: 14px; font-weight: 600; color: var(--text); }
    .nav-links { display: flex; gap: 28px; list-style: none; }
    .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: var(--mono); }

    /* ── HERO & SKY ── */
    .hero {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(500px, 48vw);
      min-height: 520px;
    }

    /* Background Mist/Clouds */
    .sky-background {
      position: absolute;
      inset: -200px;
      z-index: 0;
      background-image: 
        radial-gradient(ellipse 300px 150px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 80%),
        radial-gradient(ellipse 400px 200px at 70% 60%, rgba(255,255,255,0.3) 0%, transparent 80%),
        radial-gradient(ellipse 350px 180px at 40% 90%, rgba(255,255,255,0.35) 0%, transparent 80%);
      filter: blur(60px);
      opacity: 0.8;
      animation: skyDrift 12s linear infinite;
    }

    /* Frontal SVG Clouds */
    .cloud {
      position: absolute;
      z-index: 1;
      fill: rgba(255, 255, 255, 0.9);
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.05));
      animation: skyDrift 8s linear infinite; /* Slightly faster than background */
    }

    .cloud-1 { width: 150px; top: 10%; left: 80%; opacity: 0.9; animation-duration: 7s; }
    .cloud-2 { width: 220px; top: 60%; left: 40%; opacity: 0.7; animation-duration: 10s; }
    .cloud-3 { width: 180px; top: 30%; left: 10%; opacity: 0.8; animation-duration: 9s; }

    @keyframes skyDrift {
      from { transform: translate(0, 0); }
      to { transform: translate(-400px, 571px); } /* 55 degree descent */
    }

    /* Content Styling */
    .hero-inner {
      position: relative; z-index: 3;
      padding: 72px 48px 72px 40px;
      display: flex; flex-direction: column; justify-content: center;
    }
    
    /* Darken text slightly for readability on light sky */
    .hero h1 { color: #08090f; font-size: 54px; font-weight: 700; line-height: 1.1; margin-bottom: 18px; }
    .hero h1 em { font-style: normal; color: #1e6acc; }
    .hero-desc { color: rgba(8,9,15,0.7); font-family: var(--mono); margin-bottom: 36px; max-width: 520px; }
    
    .hero-eyebrow {
      display: inline-flex; gap: 8px; font-family: var(--mono); font-size: 11px;
      color: #08090f; border: 0.5px solid rgba(8,9,15,0.2);
      background: rgba(255,255,255,0.4); padding: 5px 14px; border-radius: 4px; margin-bottom: 22px; width: fit-content;
    }

    .hero-stats {
      display: flex; border: 0.5px solid rgba(8,9,15,0.15); border-radius: 8px; overflow: hidden; width: fit-content;
      background: rgba(255,255,255,0.2);
    }
    .stat { padding: 16px 28px; border-right: 0.5px solid rgba(8,9,15,0.15); }
    .stat:last-child { border-right: none; }
    .stat-val { font-family: var(--mono); font-size: 20px; font-weight: 700; color: #1e6acc; display: block; }
    .stat-label { font-size: 11px; color: rgba(8,9,15,0.5); text-transform: uppercase; margin-top: 3px; }

    .hero-img-wrap {
      position: relative; z-index: 3;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-img-wrap img {
      width: min(100%, 620px);
      object-fit: contain;
      animation: rocketJitter 0.35s linear infinite;
    }

    @keyframes rocketJitter {
      0% { transform: translate(0, 0); }
      25% { transform: translate(0.4px, -0.5px); }
      50% { transform: translate(-0.3px, -0.2px); }
      75% { transform: translate(-0.5px, 0.4px); }
      100% { transform: translate(0, 0); }
    }

    /* Text Fade Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-inner > * { opacity: 0; animation: fadeUp 0.6s ease forwards; }
    .hero-eyebrow { animation-delay: 0.05s; }
    .hero h1      { animation-delay: 0.15s; }
    .hero-desc    { animation-delay: 0.25s; }
    .hero-stats   { animation-delay: 0.35s; }

    /* ── SECTIONS ── */
    .section { padding: 56px 40px; border-top: 0.5px solid var(--border); }
  </style>
</head>
<body>

    </a>
    <ul class="nav-links">
      <li><a href="home.html">home</a></li>

      <li><a href="join-us.html">join us</a></li>
    </ul>
  </nav>

  <section class="hero">

    <svg class="cloud cloud-1" viewBox="0 0 24 24"><path d="M17.5,19c-3.037,0-5.5-2.463-5.5-5.5c0-0.007,0-0.013,0-0.02c-0.033,0.007-0.066,0.02-0.1,0.02c-2.154,0-3.9-1.746-3.9-3.9 c0-2.154,1.746-3.9,3.9-3.9c0.512,0,0.994,0.1,1.439,0.278C14.162,4.8,15.711,4,17.439,4c2.61,0,4.739,2.01,4.97,4.56 C23.475,9.255,24,10.316,24,11.5c0,1.933-1.567,3.5-3.5,3.5c-0.133,0-0.262-0.009-0.389-0.024C19.646,17.558,17.5,19,17.5,19z"/></svg>
    
    <svg class="cloud cloud-2" viewBox="0 0 24 24"><path d="M17.5,19c-3.037,0-5.5-2.463-5.5-5.5c0-0.007,0-0.013,0-0.02c-0.033,0.007-0.066,0.02-0.1,0.02c-2.154,0-3.9-1.746-3.9-3.9 c0-2.154,1.746-3.9,3.9-3.9c0.512,0,0.994,0.1,1.439,0.278C14.162,4.8,15.711,4,17.439,4c2.61,0,4.739,2.01,4.97,4.56 C23.475,9.255,24,10.316,24,11.5c0,1.933-1.567,3.5-3.5,3.5c-0.133,0-0.262-0.009-0.389-0.024C19.646,17.558,17.5,19,17.5,19z"/></svg>

    <svg class="cloud cloud-3" viewBox="0 0 24 24"><path d="M17.5,19c-3.037,0-5.5-2.463-5.5-5.5c0-0.007,0-0.013,0-0.02c-0.033,0.007-0.066,0.02-0.1,0.02c-2.154,0-3.9-1.746-3.9-3.9 c0-2.154,1.746-3.9,3.9-3.9c0.512,0,0.994,0.1,1.439,0.278C14.162,4.8,15.711,4,17.439,4c2.61,0,4.739,2.01,4.97,4.56 C23.475,9.255,24,10.316,24,11.5c0,1.933-1.567,3.5-3.5,3.5c-0.133,0-0.262-0.009-0.389-0.024C19.646,17.558,17.5,19,17.5,19z"/></svg>

    <div class="hero-inner">
      <div class="hero-eyebrow">American Rocketry Challenge 2026</div>
      <h1>Built to hit<br><em>750 feet.</em></h1>

      <div class="hero-stats">

          <span class="stat-val">750 ft</span>

        <div class="stat">
          <span class="stat-val">36–39 s</span>

        <div class="stat">
          <span class="stat-val">1 egg</span>

    </div>
    
    <div class="hero-img-wrap">
      <img src="arc26-media/full_assembly_render_1.png" alt="ARC 2026 rocket" />
